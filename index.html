}

}

}

  padding: 6px 12px;

lastTotal, rate, avg, unverified, recurring, thisMonth };\n  }, [expenses, cm, cy]);\n\n  const monthlyData = useMemo(() => {\n    const arr = [];\n    for (let i = 5; i >= 0; i--) {\n      const m = new Date(cy, cm - i, 1);\n      const total = expenses\n        .filter(e => {\n          const d = new Date(e.일자 + 'T00:00:00');\n          return d.getMonth() === m.getMonth() && d.getFullYear() === m.getFullYear();\n        })\n        .reduce((s, e) => s + e.금액, 0);\n      arr.push({ label: `${m.getMonth() + 1}월`, total });\n    }\n    return arr;\n  }, [expenses, cm, cy]);\n\n  const maxM = Math.max(...monthlyData.map(m => m.total), 1);\n\n  const payBreak = useMemo(() => {\n    const map = {};\n    stats.thisMonth.forEach(e => {\n      map[e.지급수단] = (map[e.지급수단] || 0) + e.금액;\n    });\n    return Object.entries(map)\n      .map(([name, amount]) => ({ name, amount }))\n      .sort((a, b) => b.amount - a.amount);\n  }, [stats.thisMonth]);\n\n  const maxP = Math.max(...payBreak.map(p => p.amount), 1);\n\n  const kpis = [\n    { title: '이번 달 총지출', value: formatWon(stats.thisTotal), color: 'text-slate-800' },\n    { title: '전월 대비', value: `${Number(stats.rate) >= 0 ? '▲' : '▼'} ${Math.abs(stats.rate)}%`, color: Number(stats.rate) >= 0 ? 'text-red-500' : 'text-green-500' },\n    { title: '일평균 지출', value: formatWon(stats.avg), color: 'text-slate-800' },\n    { title: '미증빙 건수', value: `${stats.unverified}건`, color: 'text-amber-500' },\n    { title: '월정기결제 합계', value: formatWon(stats.recurring), color: 'text-indigo-600' },\n  ];\n\n  return (\n    <div className=\"p-6 max-w-6xl mx-auto\">\n      <div className=\"flex items-center justify-between mb-6\">\n        <h2 className=\"text-2xl font-bold text-slate-800\">📊 대시보드</h2>\n        <button onClick={() => onNavigate('add')} className=\"bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors\">+ 지출 등록</button>\n      </div>\n\n      <div className=\"grid grid-cols-5 gap-4 mb- ate-600 w-16 shrink-0\">{p.name}</span>\n                  <div className=\"flex-1 bg-slate-100 rounded-full h-5 overflow-hidden\">\n                    <div className=\"h-bar h-full\" style={w} />\n                  </div>\n                  <span className=\"text-xs text-slate-500 w-28 text-right\">{formatWon(p.amount)}</span>\n                </div>\n              );\n            })}\n          </div>\n        </div>\n      </div>\n\n      <div className=\"mt-6 bg-white rounded-xl p-5 shadow-sm border border-slate-100\">\n        <div className=\"flex items-center justify-between mb-4\">\n          <h3 className=\"text-sm font-semibold text-slate-700\">최근 지출 내역</h3>\n          <button onClick={() => onNavigate('expenses')} className=\"text-xs text-indigo-600 hover:underline\">전체 보기 →</button>\n        </div>\n        <div className=\"table-wrap\">\n          <table>\n            <thead>\n              <tr>\n                <th>일자</th><th>사용처</th><th>내역안내</th><th>금액</th><th>지급 수단</th><th>증빙</th>\n              </tr>\n            </thead>\n            <tbody>\n              {expenses.slice(0, 5).map(e => (\n                <tr key={e.id}>\n                  <td>{formatDate(e.일자)}</td>\n                  <td className=\"font-medium\">{e.사용처}</td>\n                  <td className=\"text-slate-500\">{e.내역안내}</td>\n                  <td className=\"font-semibold text-right\">{formatWon(e.금액)}</td>\n                  <td><span className=\"badge badge-blue\">{e.지급수단}</span></td>\n                  <td>{e.증빙확인 ? <span className=\"badge badge-green\">확인</span> : <span className=\"badge badge-red\">미확인</span>}</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nconst PER_PAGE = 10;\n\nfunction ExpenseList({ expenses, onNavigate }) {\n  const [search, setSearch] = useState('');\n  const [filterPay, setFilterPay] = useState('');\n  const [filterEvidence, setFilterEvidence] = useState('');\n  const [filterVerified, setFilterVerified] = useState('');\n  const [filterRecurring, setFilterRecurring] = useState('');\n  const [page, setPage] = useState(1);\n\n  const filtered = useMemo(() => {\n    let data = [...expenses];\n    if (search) {\n      const q = search.toLowerCase();\n      data = data.filter(e => e.사용처.toLowerCase().includes(q) || e.내역안내.toLowerCase().includes(q));\n    }\n    if (filterPay) data = data.filter(e => e.지급수단 === filterPay);\n    if (filterEvidence) data = data.filter(e => e.지출증빙 === filterEvidence);\n    if (filterVerified === 'yes') data = data.filter(e => e.증빙확인);\n    if (filterVerified === 'no') data = data.filter(e => !e.증빙확인);\n    if (filterRecurring === 'yes') data = data.filter(e => e.월정기결제);\n    if (filterRecurring === 'no') data = data.filter(e => !e.월정기결제);\n    data.sort((a, b) => b.일자.localeCompare(a.일자));\n    return data;\n  }, [expenses, search, filterPay, filterEvidence, filterVerified, filterRecurring]);\n\n  const totalPages = Math.ceil(filtered.length / PER_PAGE);\n  const pageData = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);\n  const totalAmount = filtered.reduce((s, e) => s + e.금액, 0);\n\n  function resetFilters() {\n    setSearch(''); setFilterPay(''); setFilterEvidence(''); setFilterVerified(''); setFilterRecurring(''); setPage(1);\n  }\n\n  return (\n    <div className=\"p-6 max-w-6xl mx-auto\">\n      <div className=\"flex items-center justify-between mb-6\">\n        <h2 className=\"text-2xl font-bold text-slate-800\">📋 지출 내역</h2>\n        <button onClick={() => onNavigate('add')} className=\"bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors\">+ 지출 등록</button>\n      </div>\n\n      <div className=\"bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-4\">\n        <div className=\"flex flex-wrap gap-3 items-end\">\n          <div className=\"flex-1 min-w-48\">\n            <label className=\"text-xs text-slate-500 mb-1 block\">검색</label>\n            <input type=\"text\" placeholder=\"사용처, 내역 검색...\" value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} className=\"w-full px-3 py-2 border border-slate-200 rounded-lg text-sm\" />\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">지급 수단</label>\n            <select value={filterPay} onChange={e => { setFilterPay(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              {PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">지출증빙</label>\n            <select value={filterEvidence} onChange={e => { setFilterEvidence(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              {EVIDENCE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">증빙확인</label>\n            <select value={filterVerified} onChange={e => { setFilterVerified(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              <option value=\"yes\">확인</option>\n              <option value=\"no\">미확인</option>\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">월정기결제</label>\n            <select value={filterRecurring} onChange={e => { setFilterRecurring(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              <option value=\"yes\">정기</option>\n              <option value=\"no\">일반</option>\n            </select>\n          </div>\n          <button onClick={resetFilters} className=\"px-3 py-2 text-sm text-slate-500 hover:text-slate-700\">초기화</button>\n        </div>\n        <div className=\"mt-3 flex items-center gap-4 text-xs text-slate-500\">\n          <span>총 {filtered.length}건</span>\n          <span>합계: <strong className=\"text-slate-700\">{formatWon(totalAmount)}</strong></span>\n        </div>\n      </div>\n\n      <div className=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>일자</th><th>사용처</th><th>내역안내</th><th>금액</th><th>지급 수단</th><th>지출증빙</th><th>증빙</th><th>정기</th><th>비고</th>\n            </tr>\n          </thead>\n          <tbody>\n            {pageData.length === 0 && (\n              <tr><td colSpan=\"9\" className=\"text-center py-8 text-slate-400\">데이터가 없습니다</td></tr>\n            )}\n            {pageData.map(e => (\n              <tr key={e.id}>\n                <td className=\"whitespace-nowrap\">{formatDate(e.일자)}</td>\n                <td className=\"font-medium\">{e.사용처}</td>\n                <td className=\"text-slate-500 max-w-48 truncate\">{e.내역안내}</td>\n                <td className=\"font-semibold text-right whitespace-nowrap\">{formatWon(e.금액)}</td>\n                <td><span className=\"badge badge-blue\">{e.지급수단}</span></td>\n                <td><span className=\"badge badge-gray\">{e.지출증빙}</span></td>\n                <td>{e.증빙확인 ? <span className=\"badge badge-green\">✓</span> : <span className=\"badge badge-red\">✗</span>}</td>\n                <td>{e.월정기결제 ? <span className=\"badge badge-purple\">정기</span> : ''}</td>\n                <td className=\"text-slate-400 text-xs\">{e.비고}</td>\n              </tr>\n            ))}\n          </tbody>\n        </table>\n      </div>\n\n      {totalPages > 1 && (\n        <div className=\"pager\">\n          <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page <= 1}>이전</button>\n          {Array.from({ length: totalPages }, (_, i) => (\n            <button key={i + 1} className={page === i + 1 ? 'active' : ''} onClick={() => setPage(i + 1)}>{i + 1}</button>\n          ))}\n          <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page >= totalPages}>다음</button>\n        </div>\n      )}\n    </div>\n  );\n};\n\nfunction AddExpense({ onSuccess }) {\n  const today = new Date().toISOString().split('T')[0];\n  const [form, setForm] = useState({\n    사용처: '', 금액: '', 일자: today, 내역안내: '',\n    지급수단: '', 지출증빙: '', 증빙확인: false, 월정기결제: false, 비고: ''\n  });\n  const [submitting, setSubmitting] = useState(false);\n  const [result, setResult] = useState(null);\n  const [errors, setErrors] = useState({});\n\n  function validate() {\n    const errs = {};\n    if (!form.사용처.trim()) errs.사용처 = '필수 입력';\n    if (!form.금액 || Number(form.금액) <= 0) errs.금액 = '0보다 큰 금액 입력';\n    if (!form.일자) errs.일자 = '날짜 선택 필수';\n    if (!form.내역안내.trim()) errs.내역안내 = '필수 입력';\n    if (!form.지급수단) errs.지급수단 = '선택 필수';\n    if (!form.지출증빙) errs.지출증빙 = '선택 필수';\n    setErrors(errs);\n    return Object.keys(errs).length === 0;\n  }\n\n  function handleChange(field, value) {\n    setForm(prev => {\n      const next = {};\n      Object.keys(prev).forEach(k => { next[k] = prev[k]; });\n      next[field] = value;\n      return next;\n    });\n    if (errors[field]) {\n      setErrors(prev => {\n        const next = {};\n        Object.keys(prev).forEach(k => { if (k !== field) next[k] = prev[k]; });\n        return next;\n      });\n    }\n  }\n\n  async function handleSubmit(e) {\n    e.preventDefault();\n    if (!validate()) return;\n    setSubmitting(true);\n    setResult(null);\n    try {\n      const dbId = extractDbId(EXPENSE_DB_ID);\n      const body = {\n        parent: { database_id: dbId },\n        properties: {\n          '사용처': { title: [{ text: { content: form.사용처 } }] },\n          '금액': { number: Number(form.금액) },\n          '일자': { date: { start: form.일자 } },\n          '내역안내': { rich_text: [{ text: { content: form.내역안내 } }] },\n          '지급 수단': { select: { name: form.지급수단 } },\n          '지출증빙': { select: { name: form.지출증빙 } },\n          '증빙확인': { checkbox: form.증빙확인 },\n          '월정기결제': { checkbox: form.월정기결제 },\n          '비고': { rich_text: [{ text: { content: form.비고 } }] },\n        }\n      };\n      const res = await fetch('/api/notion/pages', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify(body),\n      });\n      if (!res.ok) throw new Error('저장 실패');\n      setResult('success');\n      setTimeout(() => onSuccess(), 1500);\n    } catch (err) {\n      console.error(err);\n      setResult('error');\n    } finally {\n      setSubmitting(false);\n    }\n  }\n\n  return (\n    <div className=\"p-6 max-w-2xl mx-auto\">\n      <h2 className=\"text-2xl font-bold text-slate-800 mb-6\">➕ 지출 등록</h2>\n\n      {result === 'success' && (\n        <div className=\"bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm\">✅ 등록 완료! 지출 내역으로 이동합니다...</div>\n      )}\n      {result === 'error' && (\n        <div className=\"bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm\">❌ 저장에 실패했습니다. DB 연결을 확인해주세요.</div>\n      )}\n\n      <form onSubmit={handleSubmit} className=\"bg-white rounded-xl p-6 shadow-sm border border-slate-100\">\n        <div className=\"grid grid-cols-2 gap-4\">\n          <div className=\"form-group\">\n            <label className=\"required\">사용처</label>\n            <input type=\"text\" value={form.사용처} onChange={e => handleChange('사용처', e.target.value)} placeholder=\"예: 메디팜약국\" />\n            {errors.사용처 && <span className=\"text-xs text-red-500\">{errors.사용처}</span>}\n          </div>\n          <div className=\"form-group\">\n            <label className=\"required\">금액 (₩)</label>\n            <input type=\"number\" value={form.금액} onChange={e => handleChange('금액', e.target.value)} placeholder=\"0\" min=\"1\" />\n            {errors.금액 && <span className=\"text-xs text-red-500\">{errors.금액}</span>}\n          </div>\n          <div className=\"form-group\">\n            <label className=\"required\">일자</label>\n            <input type=\"date\" value={form.일자} onChange={e => handleChange('일자', e.target.value)} />\n            {errors.일자 && <span className=\"text-xs text-red-500\">{errors.일자}</span>}\n          </div>\n          <div className=\"form-group\">\n            <label className=\"required\">내역안내</label>\n            <input type=\"text\" value={form.내역안내} onChange={e => handleChange('내역안내', e.target.value)} placeholder=\"지출 상세 내역\" />\n            {errors.내역안내 && <span className=\"text-xs text-red-500\">{errors.내역안내}</span>}\n          </div>\n          <div className=\"form-group\">\n            <label className=\"required\">지급 수단</label>\n            <select value={form.지급수단} onChange={e => handleChange('지급수단', e.target.value)}>\n              <option value=\"\">선택하세요</option>\n              {PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}\n            </select>\n            {errors.지급수단 && <span className=\"text-xs text-red-500\">{errors.지급수단}</span>}\n          </div>\n          <div className=\"form-group\">\n            <label className=\"required\">지출증빙</label>\n            <select value={form.지출증빙} onChange={e => handleChange('지출증빙', e.target.value)}>\n              <option value=\"\">선택하세요</option>\n              {EVIDENCE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}\n            </select>\n            {errors.지출증빙 && <span className=\"text-xs text-red-500\">{errors.지출증빙}</span>}\n          </div>\n        </div>\n\n        <div className=\"mt-4 form-group\">\n          <label>비고</label>\n          <textarea value={form.비고} onChange={e => handleChange('비고', e.target.value)} placeholder=\"추가 메모 (선택)\" rows=\"2\" />\n        </div>\n\n        <div className=\"mt-4 flex gap-6\">\n          <label className=\"flex items-center gap-2 text-sm text-slate-600 cursor-pointer\">\n            <input type=\"checkbox\" checked={form.증빙확인} onChange={e => handleChange('증빙확인', e.target.checked)} className=\"w-4 h-4 rounded\" />\n            증빙확인\n          </label>\n          <label className=\"flex items-center gap-2 text-sm text-slate-600 cursor-pointer\">\n            <input type=\"checkbox\" checked={form.월정기결제} onChange={e => handleChange('월정기결제', e.target.checked)} className=\"w-4 h-4 rounded\" />\n            월정기결제\n          </label>\n        </div>\n\n        <div className=\"mt-6 flex gap-3\">\n          <button type=\"submit\" disabled={submitting} className=\"flex-1 bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors disabled:opacity-50\">\n            {submitting ? '저장 중...' : '💾 지출 등록'}\n          </button>\n        </div>\n      </form>\n    </div>\n  );\n};\n\nfunction Report({ expenses }) {\n  const now = new Date();\n  const cm = now.getMonth();\n  const cy = now.getFullYear();\n\n  const monthlyReport = useMemo(() => {\n    const months = [];\n    for (let i = 0; i < 6; i++) {\n      const m = new Date(cy, cm - i, 1);\n      const label = `${m.getFullYear()}.${String(m.getMonth() + 1).padStart(2, '0')}`;\n      const items = expenses.filter(e => {\n        const d = new Date(e.일자 + 'T00:00:00');\n        return d.getMonth() === m.getMonth() && d.getFullYear() === m.getFullYear();\n      });\n      const total = items.reduce((s, e) => s + e.금액, 0);\n      const count = items.length;\n      const recurring = items.filter(e => e.월정기결제).reduce((s, e) => s + e.금액, 0);\n      const unverified = items.filter(e => !e.증빙확인).length;\n      months.push({ label, total, count, recurring, unverified });\n    }\n    for (let i = 0; i < months.length - 1; i++) {\n      const prev = months[i + 1].total;\n      months[i].change = prev ? ((months[i].total - prev) / prev * 100).toFixed(1) : 0;\n    }\n    return months;\n  }, [expenses, cm, cy]);\n\n  const topVendors = useMemo(() => {\n    const thisMonth = expenses.filter(e => {\n      const d = new Date(e.일자 + 'T00:00:00');\n      return d.getMonth() === cm && d.getFullYear() === cy;\n    });\n    const map = {};\n    thisMonth.forEach(e => {\n      map[e.사용처] = (map[e.사용처] || 0) + e.금액;\n    });\n    return Object.entries(map)\n      .map(([name, amount]) => ({ name, amount }))\n      .sort((a, b) => b.amount - a.amount)\n      .slice(0, 5);\n  }, [expenses, cm, cy]);\n\n  const maxV = Math.max(...topVendors.map(v => v.amount), 1);\n\n  const payReport = useMemo(() => {\n    const thisMonth = expenses.filter(e => {\n      const d = new Date(e.일자 + 'T00:00:00');\n      return d.getMonth() === cm && d.getFullYear() === cy;\n    });\n    const total = thisMonth.reduce((s, e) => s + e.금액, 0);\n    const map = {};\n    thisMonth.forEach(e => {\n      map[e.지급수단] = (map[e.지급수단] || 0) + e.금액;\n    });\n    return Object.entries(map)\n      .map(([name, amount]) => ({ name, amount, pct: total ? (amount / total * 100).toFixed(1) : 0 }))\n      .sort((a, b) => b.amount - a.amount);\n  }, [expenses, cm, cy]);\n\n  return (\n    <div className=\"p-6 max-w-6xl mx-auto\">\n      <h2 className=\"text-2xl font-bold text-slate-800 mb-6\">📈 분석 리포트</h2>\n\n      <div className=\"bg-white rounded-xl p-5 shadow-sm border border-slate-100 mb-6\">\n        <h3 className=\"text-sm font-semibold text-slate-700 mb-4\">월별 비교 (최근 6개월)</h3>\n        <div className=\"table-wrap\">\n          <table>\n            <thead>\n              <tr>\n                <th>월</th><th className=\"text-right\">총지출</th><th className=\"text-right\">건수</th><th className=\"text-right\">정기결제</th><th className=\"text-right\">미증빙</th><th className=\"text-right\">전월대비</th>\n              </tr>\n            </thead>\n            <tbody>\n              {monthlyReport.map(m => (\n                <tr key={m.label}>\n                  <td className=\"font-medium\">{m.label}</td>\n                  <td className=\"text-right font-semibold\">{formatWon(m.total)}</td>\n                  <td className=\"text-right\">{m.count}건</td>\n                  <td className=\"text-right text-indigo-600\">{formatWon(m.recurring)}</td>\n                  <td className=\"text-right\">{m.unverified > 0 ? <span className=\"text-amber-500\">{m.unverified}건</span> : <span className=\"text-slate-400\">0건</span>}</td>\n                  <td className=\"text-right\">\n                    {m.change !== undefined ? (\n                      <span className={Number(m.change) >= 0 ? 'text-red-500' : 'text-green-500'}>\n                        {Number(m.change) >= 0 ? '▲' : '▼'} {Math.abs(m.change)}%\n                      </span>\n                    ) : <span className=\"text-slate-400\">—</span>}\n                  </td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </div>\n\n      <div className=\"grid grid-cols-2 gap-6\">\n        <div className=\"bg-white rounded-xl p-5 shadow-sm border border-slate-100\">\n          <h3 className=\"text-sm font-semibold text-slate-700 mb-4\">사용처별 Top 5 (당월)</h3>\n          {topVendors.length === 0 && <p className=\"text-sm text-slate-400 text-center py-8\">당월 데이터가 없습니다</p>}\n          <div className=\"flex flex-col gap-3\">\n            {topVendors.map((v, i) => {\n              const w = { width: (v.amount / maxV * 100) + '%', backgroundColor: COLORS[i % COLORS.length] };\n              return (\n                <div key={v.name} className=\"flex items-center gap-3\">\n                  <span className=\"text-xs font-semibold text-slate-500 w-5\">{i + 1}</span>\n                  <span className=\"text-sm text-slate-700 w-28 shrink-0 truncate\">{v.name}</span>\n                  <div className=\"flex-1 bg-slate-100 rounded-full h-4 overflow-hidden\">\n                    <div className=\"h-bar h-full\" style={w} />\n                  </div>\n                  <span className=\"text-x
