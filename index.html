@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root {
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --bg: #f1f5f9;
}

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  margin: 0;
}

#root { min-height: 100vh; }

.bar-chart-bar {
  transition: height 0.5s ease;
  border-radius: 4px 4px 0 0;
}

.h-bar {
  transition: width 0.5s ease;
  border-radius: 9999px;
}

.kpi-card {
  transition: transform 0.2s, box-shadow 0.2s;
}
.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 9999px;
  font-size: 12px;
  font-weight: 500;
}

.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-amber { background: #fef3c7; color: #92400e; }
.badge-purple { background: #ede9fe; color: #5b21b6; }
.badge-gray { background: #f1f5f9; color: #475569; }

.table-wrap {
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  background: #fff;
}

.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.table-wrap th {
  background: #f8fafc;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: #475569;
  border-bottom: 1px solid #e2e8f0;
  white-space: nowrap;
}

.table-wrap td {
  padding: 10px 12px;
  border-bottom: 1px solid #f1f5f9;
  color: #334155;
}

.table-wrap tr:hover td {
  background: #f8fafc;
}

.pager {
  display: flex;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 1.5rem;
}

.pager button {
  padding: 6px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  background: #fff;
  color: #475569;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.pager button:hover:not(:disabled) {
  background: #4f46e5;
  color: #fff;
  border-color: #4f46e5;
}

.pager button.active {
  background: #4f46e5;
  color: #fff;
  border-color: #4f46e5;
}

.pager button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 13px;
  font-weight: 600;
  color: #334155;
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 10px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  color: #1e293b;
  background: #fff;
  font-family: inherit;
}

.form-group .required::after {
  content: ' *';
  color: #ef4444;
}
</style>

     {monthlyData.map((m, i) => {\n              const pct = (m.total / maxM) * 100;\n              const barH = { height: pct + '%', minHeight: m.total > 0 ? '4px' : '0' };\n              return (\n                <div key={i} className=\"flex-1 flex flex-col items-center justify-end h-full\">\n                  <span className=\"text-xs text-slate-500 mb-1 whitespace-nowrap\">{m.total > 0 ? formatWon(m.total) : ''}</span>\n                  <div className=\"bar-chart-bar w-full bg-indigo-500\" style={barH} />\n                  <span className=\"text-xs text-slate-400 mt-2\">{m.label}</span>\n                </div>\n              );\n            })}\n          </div>\n        </div>\n\n        <div className=\"bg-white rounded-xl p-5 shadow-sm border border-slate-100\">\n          <h3 className=\"text-sm font-semibold text-slate-700 mb-4\">결제수단별 분포 ({cy}년 {cm + 1}월)</h3>\n          <div className=\"flex flex-col gap-3\">\n            {payBreak.length === 0 && <p className=\"text-sm text-slate-400 text-center py-8\">당월 데이터가 없습니다</p>}\n            {payBreak.map((p, i) => {\n              const w = { width: (p.amount / maxP * 100) + '%', backgroundColor: COLORS[i % COLORS.length] };\n              return (\n                <div key={p.name} className=\"flex items-center gap-3\">\n                  <span className=\"text-xs text-slate-600 w-16 shrink-0\">{p.name}</span>\n                  <div className=\"flex-1 bg-slate-100 rounded-full h-5 overflow-hidden\">\n                    <div className=\"h-bar h-full\" style={w} />\n                  </div>\n                  <span className=\"text-xs text-slate-500 w-28 text-right\">{formatWon(p.amount)}</span>\n                </div>\n              );\n            })}\n          </div>\n        </div>\n      </div>\n\n      <div className=\"mt-6 bg-white rounded-xl p-5 shadow-sm border border-slate-100\">\n        <h3 className=\"text-sm font-semibold text-slate-700 mb-4\">📂 카테고리별 지출 분포 ({cy}년 {cm + 1}월)</h3>\n        <div className=\"grid grid-cols-2 gap-x-6 gap-y-2\">\n          {catBreak.length === 0 && <p className=\"text-sm text-slate-400 col-span-2 text-center py-4\">당월 데이터가 없습니다</p>}\n          {catBreak.map((c, i) => {\n            const w = { width: (c.amount / maxC * 100) + '%', backgroundColor: COLORS[i % COLORS.length] };\n            return (\n              <div key={c.name} className=\"flex items-center gap-2\">\n                <span className=\"text-base w-6 text-center\">{c.icon}</span>\n                <span className=\"text-xs text-slate-600 w-20 shrink-0 truncate\">{c.name}</span>\n                <div className=\"flex-1 bg-slate-100 rounded-full h-4 overflow-hidden\">\n                  <div className=\"h-bar h-full\" style={w} />\n                </div>\n                <span className=\"text-xs text-slate-500 w-24 text-right\">{formatWon(c.amount)}</span>\n              </div>\n            );\n          })}\n        </div>\n      </div>\n\n      <div className=\"mt-6 bg-white rounded-xl p-5 shadow-sm border border-slate-100\">\n        <div className=\"flex items-center justify-between mb-4\">\n          <h3 className=\"text-sm font-semibold text-slate-700\">{isCurrentMonth ? '최근' : (cm + 1) + '월'} 지출 내역</h3>\n          <button onClick={() => onNavigate('expenses')} className=\"text-xs text-indigo-600 hover:underline\">전체 보기 →</button>\n        </div>\n        <div className=\"table-wrap\">\n          <table>\n            <thead>\n              <tr>\n                <th>일자</th><th>사용처</th><th>카테고리</th><th>내역안내</th><th>금액</th><th>지급 수단</th><th>증빙</th>\n              </tr>\n            </thead>\n            <tbody>\n              {[...stats.thisMonth].sort((a, b) => b.일자.localeCompare(a.일자)).slice(0, 5).map(e => (\n                <tr key={e.id}>\n                  <td>{formatDate(e.일자)}</td>\n                  <td className=\"font-medium\">{e.사용처}</td>\n                  <td>{e.카테고리 ? <span className=\"badge badge-purple\">{e.카테고리}</span> : ''}</td>\n                  <td className=\"text-slate-500\">{e.내역안내}</td>\n                  <td className=\"font-semibold text-right\">{formatWon(e.금액)}</td>\n                  <td><span className=\"badge badge-blue\">{e.지급수단}</span></td>\n                  <td>{e.증빙확인 ? <span className=\"badge badge-green\">확인</span> : <span className=\"badge badge-red\">미확인</span>}</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nconst PER_PAGE = 10;\n\nfunction ExpenseList({ expenses, onNavigate }) {\n  const [search, setSearch] = useState('');\n  const [filterPay, setFilterPay] = useState('');\n  const [filterEvidence, setFilterEvidence] = useState('');\n  const [filterVerified, setFilterVerified] = useState('');\n  const [filterRecurring, setFilterRecurring] = useState('');\n  const [filterCategory, setFilterCategory] = useState('');\n  const [page, setPage] = useState(1);\n\n  const filtered = useMemo(() => {\n    let data = [...expenses];\n    if (search) {\n      const q = search.toLowerCase();\n      data = data.filter(e => e.사용처.toLowerCase().includes(q) || e.내역안내.toLowerCase().includes(q));\n    }\n    if (filterPay) data = data.filter(e => e.지급수단 === filterPay);\n    if (filterEvidence) data = data.filter(e => e.지출증빙 === filterEvidence);\n    if (filterVerified === 'yes') data = data.filter(e => e.증빙확인);\n    if (filterVerified === 'no') data = data.filter(e => !e.증빙확인);\n    if (filterRecurring === 'yes') data = data.filter(e => e.월정기결제);\n    if (filterRecurring === 'no') data = data.filter(e => !e.월정기결제);\n    if (filterCategory) data = data.filter(e => e.카테고리 === filterCategory);\n    data.sort((a, b) => b.일자.localeCompare(a.일자));\n    return data;\n  }, [expenses, search, filterPay, filterEvidence, filterVerified, filterRecurring, filterCategory]);\n\n  const totalPages = Math.ceil(filtered.length / PER_PAGE);\n  const pageData = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);\n  const totalAmount = filtered.reduce((s, e) => s + e.금액, 0);\n\n  function resetFilters() {\n    setSearch(''); setFilterPay(''); setFilterEvidence(''); setFilterVerified(''); setFilterRecurring(''); setFilterCategory(''); setPage(1);\n  }\n\n  return (\n    <div className=\"p-6 max-w-6xl mx-auto\">\n      <div className=\"flex items-center justify-between mb-6\">\n        <h2 className=\"text-2xl font-bold text-slate-800\">📋 지출 내역</h2>\n        <button onClick={() => onNavigate('add')} className=\"bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors\">+ 지출 등록</button>\n      </div>\n\n      <div className=\"bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-4\">\n        <div className=\"flex flex-wrap gap-3 items-end\">\n          <div className=\"flex-1 min-w-48\">\n            <label className=\"text-xs text-slate-500 mb-1 block\">검색</label>\n            <input type=\"text\" placeholder=\"사용처, 내역 검색...\" value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} className=\"w-full px-3 py-2 border border-slate-200 rounded-lg text-sm\" />\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">지급 수단</label>\n            <select value={filterPay} onChange={e => { setFilterPay(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              {PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">지출증빙</label>\n            <select value={filterEvidence} onChange={e => { setFilterEvidence(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              {EVIDENCE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">증빙확인</label>\n            <select value={filterVerified} onChange={e => { setFilterVerified(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              <option value=\"yes\">확인</option>\n              <option value=\"no\">미확인</option>\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">월정기결제</label>\n            <select value={filterRecurring} onChange={e => { setFilterRecurring(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              <option value=\"yes\">정기</option>\n              <option value=\"no\">일반</option>\n            </select>\n          </div>\n          <div>\n            <label className=\"text-xs text-slate-500 mb-1 block\">카테고리</label>\n            <select value={filterCategory} onChange={e => { setFilterCategory(e.target.value); setPage(1); }} className=\"px-3 py-2 border border-slate-200 rounded-lg text-sm\">\n              <option value=\"\">전체</option>\n              {FALLBACK_CATEGORIES.filter(c => c.활성).map(c => <option key={c.id} value={c.카테고리명}>{c.아이콘} {c.카테고리명}</option>)}\n            </select>\n          </div>\n          <button onClick={resetFilters} className=\"px-3 py-2 text-sm text-slate-500 hover:text-slate-700\">초기화</button>\n        </div>\n        <div className=\"mt-3 flex items-center gap-4 text-xs text-slate-500\">\n          <span>총 {filtered.length}건</span>\n          <span>합계: <strong className=\"text-slate-700\">{formatWon(totalAmount)}</strong></span>\n        </div>\n      </div>\n\n      <div className=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>일자</th><th>사용처</th><th>카테고리</th><th>내역안내</th><th>금액</th><th>지급 수단</th><th>지출증빙</th><th>증빙</th><th>정기</th><th>비고</th>\n            </tr>\n          </thead>\n          <tbody>\n            {pageData.length === 0 && (\n              <tr><td colSpan=\"10\" className=\"text-center py-8 text-slate-400\">데이터가 없습니다</td></tr>\n            )}\n            {pageData.map(e => (\n              <tr key={e.id}>\n                <td className=\"whitespace-nowrap\">{formatDate(e.일자)}</td>\n                <td className=\"font-medium\">{e.사용처}</td>\n                <td>{e.카테고리 ? <span className=\"badge badge-purple\">{e.카테고리}</span> : <span className=\"text-slate-300\">—</span>}</td>\n                <td className=\"text-slate-500 max-w-48 truncate\">{e.내역안내}</td>\n                <td className=\"font-semibold text-right whitespace-nowrap\">{formatWon(e.금액)}</td>\n                <td><span className=\"badge badge-blue\">{e.지급수단}</span></td>\n                <td><span className=\"badge badge-gray\">{e.지출증빙}</span></td>\n                <td>{e.증빙확인 ? <span className=\"badge badge-green\">✓</span> : <span className=\"badge badge-red\">✗</span>}</td>\n                <td>{e.월정기결제 ? <span className=\"badge badge-purple\">정기</span> : ''}</td>\n                <td className=\"text-slate-400 text-xs\">{e.비고}</td>\n              </tr>\n            ))}\n          </tbody>\n        </table>\n      </div>\n\n      {totalPages > 1 && (\n        <div className=\"pager\">\n          <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page <= 1}>이전</button>\n          {Array.from({ length: totalPages }, (_, i) => (\n            <button key={i + 1} className={page === i + 1 ? 'active' : ''} onClick={() => setPage(i + 1)}>{i + 1}</button>\n          ))}\n          <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page >= totalPages}>다음</button>\n        </div>\n      )}\n    </div>\n  );\n};\n\nfunction AddExpense({ onSuccess }) {\n  const today = new Date().toISOString().split('T')[0];\n  const [form, setForm] = useState({\n    사용처: '', 금액: '', 일자: today, 내역안내: '',\n    지급수단: '', 지출증빙: '', 카테고리: '', 증빙확인: false, 월정기결제: false, 비고: ''\n  });\n  const [submitting, setSubmitting] = useState(false);\n  const [result, setResult] = useState(null);\n  const [errors, setErrors] = useState({});\n\n  function validate() {\n    const errs = {};\n    if (!form.사용처.trim()) errs.사용처 = '필수 입력';\n    if (!form.금액 || Number(form.금액) <= 0) errs.금액 = '0보다 큰 금액 입력';\n    if (!form.일자) errs.일자 = '날짜 선택 필수';\n    if (!form.내역안내.trim()) errs.내역안내 = '필수 입력';\n    if (!form.지급수단) errs.지급수단 = '선택 필수';\n    if (!form.지출증빙) errs.지출증빙 = '선택 필수';\n    setErrors(errs);\n    return Object.keys(errs).length === 0;\n  }\n\n  function handleChange(field, value) {\n    setForm(prev => {\n      const next = {};\n      Object.keys(prev).forEach(k => { next[k] = prev[k]; });\n      next[field] = value;\n      return next;\n    });\n    if (errors[field]) {\n      setErrors(prev => {\n        const next = {};\n        Object.keys(prev).forEach(k => { if (k !== field) next[k] = prev[k]; });\n        return next;\n      });\n    }\n  }\n\n  async function handleSubmit(e) {\n    e.preventDefault();\n    if (!validate()) return;\n    setSubmitting(true);\n    setResult(null);\n    try {\n      const dbId = extractDbId(EXPENSE_DB_ID);\n      const body = {\n        parent: { database_id: dbId },\n        properties: {\n          '사용처': { title: [{ text: { content: form.사용처 } }] },\n          '금액': { number: Number(form.금액) },\n          '일자': { date: { start: form.일자 } },\n          '내역안내': { rich_text: [{ text: { content: form.내역안내 } }] },\n          '지급 수단': { select: { name: form.지급수단 } },\n          '지출증빙': { select: { name: form.지출증빙 } },\n          '증빙확인': { checkbox: form.증빙확인 },\n          '월정기결제': { checkbox: form.월정기결제 },\n          '카테고리': form.카테고리 ? { select: { name: form.카테고리 } } : undefined,\n          '비고': { rich_text: [{ text: { content: form.비고 } }] },\n        }\n      };\n      const res =
